<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易方顺诊所助手 - 管理后台</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    /* 选项卡样式 */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 0;
    }
    .tab {
      padding: 12px 30px;
      background: #f5f5f5;
      border: none;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      transition: all 0.3s ease;
    }
    .tab:hover {
      background: #e8e8e8;
    }
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    
    /* 统计卡片 */
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      border-radius: 10px;
      text-align: center;
      min-width: 150px;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    /* 表格样式 */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #f9f9f9;
      border-radius: 10px;
      overflow: hidden;
    }
    th {
      background: #667eea;
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    td {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
      color: #555;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #f0f0f0;
    }
    
    /* 状态样式 */
    .empty-state, .loading, .error-state {
      text-align: center;
      padding: 60px 20px;
      font-size: 18px;
    }
    .empty-state { color: #999; }
    .error-state { color: #e74c3c; }
    .loading { color: #667eea; }
    .empty-icon, .error-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    
    /* 徽章 */
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-user { background: #4CAF50; color: white; }
    .badge-admin { background: #2196F3; color: white; }
    .badge-super_admin { background: #F44336; color: white; }
    .badge-exists { background: #4CAF50; color: white; }
    .badge-not-exists { background: #f44336; color: white; }
    
    /* 表单元素 */
    .phone, .openid {
      font-family: 'Courier New', monospace;
    }
    .phone { font-weight: bold; color: #667eea; }
    .openid { font-size: 12px; color: #999; }
    .role-select {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }
    .time {
      color: #999;
      font-size: 13px;
    }
    
    /* 按钮 */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: #e74c3c;
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .btn-success {
      background: #27ae60;
      color: white;
    }
    .btn-success:hover {
      background: #219a52;
    }
    .btn-small {
      padding: 5px 10px;
      font-size: 12px;
    }
    
    /* 数据库管理卡片 */
    .table-card {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #667eea;
    }
    .table-card.not-exists {
      border-left-color: #e74c3c;
      background: #fff5f5;
    }
    .table-info h3 {
      margin: 0 0 5px 0;
      color: #333;
    }
    .table-info p {
      margin: 0;
      color: #666;
      font-size: 14px;
    }
    .table-actions {
      display: flex;
      gap: 10px;
    }
    
    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    .pagination button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:hover:not(:disabled) {
      background: #f0f0f0;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination span {
      color: #666;
    }
    
    /* JSON 数据展示 */
    .json-data {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 400px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    
    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: white;
      border-radius: 15px;
      padding: 30px;
      max-width: 90%;
      max-height: 80vh;
      overflow: auto;
      min-width: 400px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      margin: 0;
      color: #333;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .modal-close:hover {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏥 易方顺诊所助手</h1>
    <p class="subtitle">管理后台（超级管理员权限）</p>

    <!-- 选项卡 -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('users')">👥 用户管理</button>
      <button class="tab" onclick="switchTab('database')">🗄️ 数据库管理</button>
    </div>

    <!-- 用户管理 -->
    <div id="usersTab" class="tab-content active">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="userCount">0</div>
          <div class="stat-label">已绑定用户</div>
        </div>
      </div>
      <div id="userTableContainer">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 数据库管理 -->
    <div id="databaseTab" class="tab-content">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="tableCount">0</div>
          <div class="stat-label">数据表</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="totalRecords">0</div>
          <div class="stat-label">总记录数</div>
        </div>
      </div>
      <div id="tableListContainer">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 数据查看模态框 -->
  <div id="dataModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">数据详情</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modalBody">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    // 当前状态
    let currentTable = null;
    let currentPage = 1;
    let pageSize = 20;

    // 页面加载完成
    document.addEventListener('DOMContentLoaded', async function() {
      await loadUsers();
      await loadTables();
    });

    // 主页专用的fetch包装器
    async function homeFetch(url, options = {}) {
      const defaultOptions = { headers: {} };
      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers,
          'x-home-page': 'true'
        }
      };
      return fetch(url, mergedOptions);
    }

    // 切换选项卡
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
      document.getElementById(`${tab}Tab`).classList.add('active');
    }

    // ==================== 用户管理 ====================

    async function loadUsers() {
      try {
        const response = await homeFetch('/api/home/users');
        const result = await response.json();
        
        if (result.code === 0) {
          renderUsers(result.data);
        } else {
          showError('userTableContainer', '获取用户列表失败：' + (result.message || '未知错误'));
        }
      } catch (error) {
        console.error('获取用户列表失败:', error);
        showError('userTableContainer', '网络错误，请重试');
      }
    }

    function renderUsers(users) {
      const userCountEl = document.getElementById('userCount');
      const containerEl = document.getElementById('userTableContainer');
      
      userCountEl.textContent = users.length;

      if (users.length === 0) {
        containerEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>暂无已绑定手机号的用户</p>
          </div>
        `;
        return;
      }

      let tableHtml = `
        <table>
          <thead>
            <tr>
              <th>OpenID</th>
              <th>姓名</th>
              <th>手机号</th>
              <th>角色</th>
              <th>绑定时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      users.forEach(user => {
        const roleClass = 'badge-' + user.role;
        const roleText = user.role === 'user' ? '普通用户' : (user.role === 'admin' ? '管理员' : '超级管理员');
        const timeText = user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN') : '-';

        tableHtml += `
          <tr>
            <td><span class="openid">${user.openid}</span></td>
            <td>${user.name || '-'}</td>
            <td><span class="phone">${user.phone}</span></td>
            <td><span class="badge ${roleClass}">${roleText}</span></td>
            <td><span class="time">${timeText}</span></td>
            <td>
              <select class="role-select" data-openid="${user.openid}" data-role="${user.role}" onchange="setUserRole(this)">
                <option value="user" ${user.role === 'user' ? 'selected' : ''}>普通用户</option>
                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>管理员</option>
                <option value="super_admin" ${user.role === 'super_admin' ? 'selected' : ''}>超级管理员</option>
              </select>
            </td>
          </tr>
        `;
      });

      tableHtml += `</tbody></table>`;
      containerEl.innerHTML = tableHtml;
    }

    async function setUserRole(selectElement) {
      const openid = selectElement.dataset.openid;
      const newRole = selectElement.value;
      const oldRole = selectElement.dataset.role;
      const roleName = newRole === 'user' ? '普通用户' : (newRole === 'admin' ? '管理员' : '超级管理员');
      
      if (!confirm('确定要将该用户的角色设置为 ' + roleName + ' 吗？')) {
        selectElement.value = oldRole;
        return;
      }
      
      try {
        const response = await homeFetch('/api/user/set-role', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ openid, role: newRole })
        });
        
        const result = await response.json();
        
        if (result.code === 0) {
          alert('角色设置成功');
          selectElement.dataset.role = newRole;
          await loadUsers();
        } else {
          alert('角色设置失败：' + (result.message || '未知错误'));
          selectElement.value = oldRole;
        }
      } catch (error) {
        alert('角色设置失败：' + error.message);
        selectElement.value = oldRole;
      }
    }

    // ==================== 数据库管理 ====================

    async function loadTables() {
      try {
        const response = await homeFetch('/api/admin/tables');
        const result = await response.json();
        
        if (result.code === 0) {
          renderTables(result.data);
        } else {
          showError('tableListContainer', '获取表列表失败：' + (result.message || '未知错误'));
        }
      } catch (error) {
        console.error('获取表列表失败:', error);
        showError('tableListContainer', '网络错误，请重试');
      }
    }

    function renderTables(tables) {
      const tableCountEl = document.getElementById('tableCount');
      const totalRecordsEl = document.getElementById('totalRecords');
      const containerEl = document.getElementById('tableListContainer');
      
      tableCountEl.textContent = tables.length;
      totalRecordsEl.textContent = tables.reduce((sum, t) => sum + (t.exists ? t.count : 0), 0);

      if (tables.length === 0) {
        containerEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🗄️</div>
            <p>暂无数据表</p>
          </div>
        `;
        return;
      }

      let html = '';
      tables.forEach(table => {
        const statusBadge = table.exists 
          ? `<span class="badge badge-exists">正常</span>`
          : `<span class="badge badge-not-exists">不存在</span>`;
        
        const statusText = table.exists 
          ? `共 ${table.count} 条记录`
          : (table.error || '表不存在或无法访问');

        html += `
          <div class="table-card ${table.exists ? '' : 'not-exists'}">
            <div class="table-info">
              <h3>${table.displayName} (${table.name}) ${statusBadge}</h3>
              <p>${statusText}</p>
            </div>
            <div class="table-actions">
              ${table.exists ? `
                <button class="btn btn-primary btn-small" onclick="viewTableData('${table.name}')">📊 查看数据</button>
                <button class="btn btn-danger btn-small" onclick="clearTable('${table.name}', '${table.displayName}')">🗑️ 清空</button>
              ` : `
                <button class="btn btn-success btn-small" onclick="initTable('${table.name}')">🔧 初始化</button>
              `}
            </div>
          </div>
        `;
      });

      containerEl.innerHTML = html;
    }

    async function viewTableData(tableName) {
      currentTable = tableName;
      currentPage = 1;
      document.getElementById('modalTitle').textContent = `${tableName} 数据`;
      document.getElementById('dataModal').classList.add('show');
      await loadTableData();
    }

    async function loadTableData() {
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = '<div class="loading">加载中...</div>';
      
      try {
        const response = await homeFetch(`/api/admin/table/${currentTable}?page=${currentPage}&pageSize=${pageSize}`);
        const result = await response.json();
        
        if (result.code === 0) {
          renderTableData(result.data);
        } else {
          modalBody.innerHTML = `<div class="error-state"><p>${result.message}</p></div>`;
        }
      } catch (error) {
        modalBody.innerHTML = `<div class="error-state"><p>网络错误：${error.message}</p></div>`;
      }
    }

    function renderTableData(data) {
      const modalBody = document.getElementById('modalBody');
      const { rows, pagination } = data;
      
      if (rows.length === 0) {
        modalBody.innerHTML = '<div class="empty-state"><p>表中暂无数据</p></div>';
        return;
      }

      let html = `
        <div class="pagination" style="margin-bottom: 15px;">
          <button onclick="goToPage(${pagination.page - 1})" ${pagination.page <= 1 ? 'disabled' : ''}>上一页</button>
          <span>第 ${pagination.page} / ${pagination.totalPages} 页，共 ${pagination.totalCount} 条</span>
          <button onclick="goToPage(${pagination.page + 1})" ${pagination.page >= pagination.totalPages ? 'disabled' : ''}>下一页</button>
        </div>
        <div class="json-data">${JSON.stringify(rows, null, 2)}</div>
      `;

      modalBody.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadTableData();
    }

    async function clearTable(tableName, displayName) {
      // users 表额外警告
      if (tableName === 'users') {
        if (!confirm(`⚠️ 警告：清空用户表将删除所有用户数据，包括管理员账户！\n\n确定要清空 ${displayName} 吗？此操作不可恢复！`)) {
          return;
        }
        if (!confirm(`🚨 最后确认：清空用户表后，所有用户需要重新登录！\n\n确定要清空 ${displayName} 的所有数据？`)) {
          return;
        }
      } else {
        if (!confirm(`确定要清空 ${displayName} 吗？此操作不可恢复！`)) {
          return;
        }
        if (!confirm(`再次确认：清空 ${displayName} 的所有数据？`)) {
          return;
        }
      }
      
      try {
        const response = await homeFetch(`/api/admin/table/${tableName}?confirm=true`, {
          method: 'DELETE'
        });
        const result = await response.json();
        
        if (result.code === 0) {
          alert(result.message);
          await loadTables();
          // 如果清空了用户表，刷新用户列表
          if (tableName === 'users') {
            await loadUsers();
          }
        } else {
          alert('清空失败：' + (result.message || '未知错误'));
        }
      } catch (error) {
        alert('清空失败：' + error.message);
      }
    }

    async function initTable(tableName) {
      if (!confirm(`确定要初始化 ${tableName} 表吗？`)) {
        return;
      }
      
      try {
        const response = await homeFetch(`/api/admin/table/${tableName}/init`, {
          method: 'POST'
        });
        const result = await response.json();
        
        if (result.code === 0) {
          alert(result.message);
          await loadTables();
        } else {
          alert('初始化失败：' + (result.message || '未知错误'));
        }
      } catch (error) {
        alert('初始化失败：' + error.message);
      }
    }

    function closeModal() {
      document.getElementById('dataModal').classList.remove('show');
    }

    // 点击模态框外部关闭
    document.getElementById('dataModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // ==================== 工具函数 ====================

    function showError(containerId, message) {
      document.getElementById(containerId).innerHTML = `
        <div class="error-state">
          <div class="error-icon">❌</div>
          <p>${message}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
