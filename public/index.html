<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易方顺诊所助手 - 用户列表</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      border-radius: 10px;
      text-align: center;
      min-width: 150px;
    }
    .stat-number {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #f9f9f9;
      border-radius: 10px;
      overflow: hidden;
    }
    th {
      background: #667eea;
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }
    td {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
      color: #555;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #f0f0f0;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 18px;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .phone {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #667eea;
    }
    .openid {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #999;
    }
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-new {
      background: #4CAF50;
      color: white;
    }
    .badge-old {
      background: #9E9E9E;
      color: white;
    }
    .badge-user {
      background: #4CAF50;
      color: white;
    }
    .badge-admin {
      background: #2196F3;
      color: white;
    }
    .badge-super_admin {
      background: #F44336;
      color: white;
    }
    .role-select {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }
    .time {
      color: #999;
      font-size: 13px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 18px;
    }
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: #e74c3c;
      font-size: 18px;
    }
    .error-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏥 易方顺诊所助手</h1>
    <p class="subtitle">已绑定手机号的用户列表</p>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="userCount">0</div>
        <div class="stat-label">已绑定用户</div>
      </div>
    </div>

    <div id="userTableContainer">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    // 页面加载完成后获取用户列表
    document.addEventListener('DOMContentLoaded', async function() {
      await loadUsers();
    });

    // 主页专用的fetch包装器，自动添加超级管理员权限标识
    async function homeFetch(url, options = {}) {
      const defaultOptions = {
        headers: {}
      };
      
      // 合并headers，确保添加主页标识
      const mergedOptions = {
        ...defaultOptions,
        ...options,
        headers: {
          ...defaultOptions.headers,
          ...options.headers,
          'x-home-page': 'true'  // 标识这是主页请求
        }
      };
      
      return fetch(url, mergedOptions);
    }

    // 加载用户列表
    async function loadUsers() {
      try {
        const response = await homeFetch('/api/home/users');
        const result = await response.json();
        
        if (result.code === 0) {
          renderUsers(result.data);
        } else {
          showError('获取用户列表失败：' + (result.message || '未知错误'));
        }
      } catch (error) {
        console.error('获取用户列表失败:', error);
        showError('网络错误，请重试');
      }
    }

    // 渲染用户列表
    function renderUsers(users) {
      const userCountEl = document.getElementById('userCount');
      const containerEl = document.getElementById('userTableContainer');
      
      // 更新用户数量
      userCountEl.textContent = users.length;

      if (users.length === 0) {
        containerEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <p>暂无已绑定手机号的用户</p>
          </div>
        `;
        return;
      }

      // 生成表格HTML
      let tableHtml = `
        <table>
          <thead>
            <tr>
              <th>OpenID</th>
              <th>姓名</th>
              <th>手机号</th>
              <th>角色</th>
              <th>绑定时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      users.forEach(user => {
        const roleClass = 'badge-' + user.role;
        const roleText = user.role === 'user' ? '普通用户' : (user.role === 'admin' ? '管理员' : '超级管理员');
        const timeText = user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN') : '-';

        tableHtml += `
          <tr>
            <td><span class="openid">${user.openid}</span></td>
            <td>${user.name || '-'}</td>
            <td><span class="phone">${user.phone}</span></td>
            <td>
              <span class="badge ${roleClass}">
                ${roleText}
              </span>
            </td>
            <td><span class="time">${timeText}</span></td>
            <td>
              <select class="role-select" data-openid="${user.openid}" onchange="setUserRole(this)">
                <option value="user" ${user.role === 'user' ? 'selected' : ''}>普通用户</option>
                <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>管理员</option>
                <option value="super_admin" ${user.role === 'super_admin' ? 'selected' : ''}>超级管理员</option>
              </select>
            </td>
          </tr>
        `;
      });

      tableHtml += `
          </tbody>
        </table>
      `;

      containerEl.innerHTML = tableHtml;
    }

    // 显示错误信息
    function showError(message) {
      const containerEl = document.getElementById('userTableContainer');
      containerEl.innerHTML = `
        <div class="error-state">
          <div class="error-icon">❌</div>
          <p>${message}</p>
        </div>
      `;
    }

    // 设置用户角色
    async function setUserRole(selectElement) {
      const openid = selectElement.dataset.openid;
      const newRole = selectElement.value;
      const roleName = newRole === 'user' ? '普通用户' : (newRole === 'admin' ? '管理员' : '超级管理员');
      
      if (!confirm('确定要将该用户的角色设置为 ' + roleName + ' 吗？')) {
        // 恢复原来的选择
        const originalRole = selectElement.dataset.originalRole || selectElement.value;
        selectElement.value = originalRole;
        return;
      }
      
      // 保存当前值作为原始值（防止连续点击时无法恢复）
      selectElement.dataset.originalRole = newRole;
      
      try {
        const response = await homeFetch('/api/user/set-role', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            openid: openid,
            role: newRole
          })
        });
        
        const result = await response.json();
        
        if (result.code === 0) {
          alert('角色设置成功');
          // 重新加载用户列表
          await loadUsers();
        } else {
          alert('角色设置失败：' + (result.message || '未知错误'));
          // 恢复原来的选择
          const originalRole = selectElement.dataset.originalRole || selectElement.value;
          selectElement.value = originalRole;
        }
      } catch (error) {
        alert('角色设置失败：' + error.message);
        // 恢复原来的选择
        const originalRole = selectElement.dataset.originalRole || selectElement.value;
        selectElement.value = originalRole;
      }
    }
  </script>
</body>
</html>
