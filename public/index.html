<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易方顺诊所助手 - 管理后台</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <!-- 顶部栏 -->
  <header class="header">
    <div class="header-title">🏥 易方顺诊所助手 - 管理后台</div>
    <div class="header-stats" id="headerStats">加载中...</div>
  </header>
  
  <!-- 左侧栏 -->
  <aside class="sidebar" id="sidebar"></aside>
  
  <!-- 主内容区 -->
  <main class="main" id="main">
    <div class="loading">加载中...</div>
  </main>
  
  <!-- 底部状态栏 -->
  <footer class="footer">
    <div id="statusBar" class="status-bar"></div>
  </footer>
  
  <!-- 确认对话框 -->
  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="confirmTitle">确认操作</div>
        <button class="modal-close" onclick="closeConfirm()">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn" style="background: #f5f5f5; color: #333;" onclick="closeConfirm()">取消</button>
        <button class="btn btn-danger" id="confirmBtn">确认</button>
      </div>
    </div>
  </div>

  <!-- SheetJS 用于Excel导入导出 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="/js/import-export-module.js"></script>
  <script type="module" src="/js/stock-module.js"></script>
  <script type="module" src="/js/prescription-module.js"></script>
  <script type="module" src="/js/herbs-module.js"></script>
  <script type="module" src="/js/users-module.js"></script>
  <script type="module" src="/js/bookings-module.js"></script>
  <script type="module" src="/js/table-util.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
