<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易方顺诊所 - 管理员登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .login-header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .login-header p {
      color: #666;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-group label {
      display: block;
      color: #555;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-group input::placeholder {
      color: #aaa;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    .tips {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      font-size: 13px;
      color: #888;
    }
    
    .tips strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🏥 易方顺诊所</h1>
      <p>管理员登录</p>
    </div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="phone">手机号</label>
        <input 
          type="text" 
          id="phone" 
          name="phone" 
          placeholder="请输入手机号或管理员标识"
          required
          autocomplete="off"
        >
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        登录
      </button>
    </form>
    
    <div class="tips">
      <p><strong>提示：</strong></p>
      <p>• 默认超级管理员手机号：<code>home_super_admin</code></p>
      <p>• 其他管理员需先在系统中注册并设置角色</p>
    </div>
  </div>
  
  <script>
    const loginForm = document.getElementById('loginForm');
    const phoneInput = document.getElementById('phone');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    
    // 显示错误信息
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 5000);
    }
    
    // 登录处理
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const phone = phoneInput.value.trim();
      
      if (!phone) {
        showError('请输入手机号');
        return;
      }
      
      // 禁用按钮
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      try {
        const response = await fetch('/api/home-login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ phone })
        });
        
        const result = await response.json();
        
        if (result.code === 0) {
          // 登录成功，跳转到首页并带上 phone_number 参数
          const redirectUrl = window.location.pathname + '?phone_number=' + encodeURIComponent(phone);
          window.location.href = redirectUrl;
        } else {
          showError(result.message || '登录失败');
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      } catch (error) {
        console.error('登录失败:', error);
        showError('网络错误，请稍后重试');
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    });
    
    // 检查 URL 中是否已有 phone_number 参数
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('phone_number')) {
      // 已经有参数，直接跳转到首页（不需要再登录）
      window.location.href = window.location.pathname;
    }
  </script>
</body>
</html>
